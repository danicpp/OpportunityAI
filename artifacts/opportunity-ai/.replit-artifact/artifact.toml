kind = "web"
previewPath = "/"
title = "OpportunityAI"
version = "1.0.0"
id = "artifacts/opportunity-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22650

[services.development]
run = "pnpm --filter @workspace/opportunity-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/opportunity-ai", "run", "build" ]
publicDir = "artifacts/opportunity-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22650"
BASE_PATH = "/"
